name: arma_proxy_vpn_client
description: "A privacy-first proxy and VPN client for Android."
publish_to: 'none'
version: 1.0.12+4

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  android_id: ^0.5.1
  device_info_plus: ^13.1.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  equatable: ^2.0.8
  gap: ^3.0.1
  flutter_animate: ^4.5.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  http: ^1.6.0
  yaml: ^3.1.3
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  workmanager: ^0.9.0+3
  font_awesome_flutter: any
  url_launcher: ^6.3.2
  cupertino_icons: ^1.0.8
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  freezed: ^3.1.0
  json_serializable: ^6.12.0
  hive_ce_generator: ^1.10.0
  build_runner: ^2.13.1
  mockito: ^5.6.4

flutter:
  generate: true
  uses-material-design: true
  # Desktop (Linux/Windows) proxy mode bundles the xray-core binary + geo data
  # here. CI downloads the correct per-platform/arch binary into this folder
  # before building (see .github/workflows/release.yml). The binaries are
  # git-ignored; only the README placeholder is committed so the folder exists.
  assets:
    - assets/xray/
