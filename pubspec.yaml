name: arma_proxy_vpn_client
description: "A privacy-first proxy and VPN client for Android."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  equatable: ^2.0.8
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  freezed: ^3.1.0
  json_serializable: ^6.12.0
  hive_ce_generator: ^1.10.0
  build_runner: ^2.13.1
  mockito: ^5.6.4

flutter:
  generate: true
  uses-material-design: true
