name: CI

# Validation on every push to main and every PR. This does NOT publish or
# create releases — releases are cut from tags (see release.yml). Building on
# main here just keeps the branch green; the heavy per-platform packaging is
# deferred to the tag-driven release workflow to save CI minutes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Advisory only: the existing codebase isn't fully `dart format`-clean,
      # so this reports drift in the logs without failing the build. To enforce
      # it, run `dart format lib test`, commit, then drop `continue-on-error`.
      - name: Check formatting (advisory)
        run: dart format --output=none --set-exit-if-changed lib test
        continue-on-error: true

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
