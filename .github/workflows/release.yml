name: Release

# Best practice: cut releases from version tags (v1.2.3), not from every main
# push. Tags give deterministic, reviewable version boundaries; main/PR churn
# is validated by ci.yml instead. You can also trigger manually via the Actions
# tab (workflow_dispatch) and pass a version.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the leading v (e.g. 1.2.3)"
        required: true

permissions:
  contents: write # required to create GitHub Releases and tags

env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  # ── Resolve version + detect which credentials are configured ────────────
  # Store-publish and signing jobs are gated on these outputs, so the release
  # succeeds (GitHub Releases for the platforms that build) even before you add
  # any secrets. As you add credentials, the matching jobs light up.
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      has_android_signing: ${{ steps.secrets.outputs.has_android_signing }}
      has_play: ${{ steps.secrets.outputs.has_play }}
      has_appstore: ${{ steps.secrets.outputs.has_appstore }}
    steps:
      - id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (tag v$VERSION)"

      - id: secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          has() { if [ -n "$1" ]; then echo true; else echo false; fi; }
          {
            echo "has_android_signing=$(has "$ANDROID_KEYSTORE_BASE64")"
            echo "has_play=$(has "$PLAY_SERVICE_ACCOUNT_JSON")"
            echo "has_appstore=$(has "$APP_STORE_CONNECT_API_KEY")"
          } >> "$GITHUB_OUTPUT"

  # ── Android: signed APK + AAB ────────────────────────────────────────────
  android:
    name: Build Android
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # The `jni` plugin builds native code via AGP's externalNativeBuild and
      # pins no CMake version, so AGP defaults to cmake;3.22.1 and tries to
      # auto-install it through its own embedded SDK installer. That installer
      # intermittently fetches a corrupt archive on CI ("Archive is not a ZIP
      # archive" → configureCMakeRelease fails). Install the exact version up
      # front with sdkmanager so AGP finds it already present and skips its
      # buggy auto-install path entirely.
      - name: Install CMake for Android NDK build
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "cmake;3.22.1"

      # Only present when the ANDROID_KEYSTORE_* secrets are set. Without them
      # the build falls back to debug signing (see android/app/build.gradle.kts)
      # — installable for testing but NOT accepted by Play (publish-play is
      # skipped in that case).
      - name: Configure release signing
        if: needs.preflight.outputs.has_android_signing == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build APK
        run: >
          flutter build apk --release
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Build App Bundle
        run: >
          flutter build appbundle --release
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/ArmaVPN-${{ needs.preflight.outputs.version }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
             "dist/ArmaVPN-${{ needs.preflight.outputs.version }}.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*
          if-no-files-found: error

  # ── Linux desktop bundle (x64 only) ──────────────────────────────────────
  # x64 only: Flutter's stable channel ships NO arm64 Linux SDK — the release
  # manifest subosito/flutter-action reads is x64-only, so an arm64 runner
  # fails with "Unable to determine Flutter version ... architecture: arm64".
  # The only install path on arm64 is git-cloning Flutter, whose prebuilt
  # linux-arm64 engine artifacts are broken (flutter/flutter#156309 ships an
  # x86-64 frontend_server snapshot), and x64→arm64 cross-compile is
  # unsupported (flutter/flutter#117826). A real arm64 build needs a custom
  # engine — out of scope here.
  linux:
    name: Build Linux
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build tooling
        run: |
          sudo apt-get update
          # libsecret-1-dev is REQUIRED by flutter_secure_storage_linux's
          # CMake (pkg_check_modules(LIBSECRET REQUIRED ...)) and is NOT on the
          # default runner image — without it the CMake configure step fails.
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libglu1-mesa \
            libsecret-1-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-linux-desktop

      # rpm provides rpmbuild for the .rpm package.
      - name: Install packaging tooling
        run: sudo apt-get install -y rpm

      # Bundle the xray-core binary + geo data for proxy mode.
      - name: Fetch xray-core (linux-amd64)
        run: |
          mkdir -p assets/xray
          curl -fL -o /tmp/xray.zip \
            https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o /tmp/xray.zip -d assets/xray xray geoip.dat geosite.dat
          chmod +x assets/xray/xray

      - name: Build Linux
        run: >
          flutter build linux --release
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}

      # tar.gz (portable) + .deb (Debian/Ubuntu) + .rpm (Fedora/RHEL) +
      # AppImage (universal). See packaging/linux/*.sh.
      - name: Package (tar.gz, deb, rpm, AppImage)
        run: |
          V="${{ needs.preflight.outputs.version }}"
          mkdir -p dist
          tar -czf "dist/ArmaVPN-$V-linux-x64.tar.gz" \
            -C build/linux/x64/release/bundle .
          bash packaging/linux/build-deb.sh "$V" amd64
          bash packaging/linux/build-rpm.sh "$V" x86_64
          bash packaging/linux/build-appimage.sh "$V" x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
          if-no-files-found: error

  # ── Windows desktop: portable zip + Setup.exe (x64) ─────────────────────
  # x64 only: Flutter's stable channel doesn't ship a native Windows-arm64 SDK
  # (subosito/flutter-action can't resolve an arm64 build), and Windows-on-ARM
  # runs x64 apps under emulation — so the x64 build serves arm64 machines too.
  windows:
    name: Build Windows
    needs: preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop

      - name: Fetch xray-core (windows-x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path assets/xray | Out-Null
          Invoke-WebRequest -Uri "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-windows-64.zip" -OutFile "$env:TEMP\xray.zip"
          Expand-Archive -Path "$env:TEMP\xray.zip" -DestinationPath assets/xray -Force

      - name: Build Windows
        run: >
          flutter build windows --release
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Package (zip + Setup.exe)
        shell: pwsh
        run: |
          $ver = "${{ needs.preflight.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "dist/ArmaVPN-$ver-windows-x64.zip"
          # Inno Setup → Setup.exe wizard (Start-menu shortcut, uninstaller).
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$ver" `
            "/DTargetArch=x64compatible" `
            "/DArchTag=x64" `
            "/DBuildDir=$PWD\build\windows\x64\runner\Release" `
            packaging\windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            dist/*.zip
            dist/*.exe
          if-no-files-found: error

