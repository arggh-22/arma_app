  # ── Publish everything to the GitHub Releases page ───────────────────────
  github-release:
    name: GitHub Release
    needs: [preflight, android, linux, windows] # TODO add ios, macos
    if: always() && needs.android.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List collected artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          name: ArmaVPN ${{ needs.preflight.outputs.version }}
          tag_name: ${{ needs.preflight.outputs.release_tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: artifacts/**/*

