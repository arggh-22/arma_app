name: Release

# Best practice: cut releases from version tags (v1.2.3), not from every main
# push. Tags give deterministic, reviewable version boundaries; main/PR churn
# is validated by ci.yml instead. You can also trigger manually via the Actions
# tab (workflow_dispatch) and pass a version.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the leading v (e.g. 1.2.3)"
        required: true

permissions:
  contents: write # required to create GitHub Releases and tags

env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  # ── Resolve version + detect which credentials are configured ────────────
  # Store-publish and signing jobs are gated on these outputs, so the release
  # succeeds (GitHub Releases for the platforms that build) even before you add
  # any secrets. As you add credentials, the matching jobs light up.
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      has_android_signing: ${{ steps.secrets.outputs.has_android_signing }}
      has_play: ${{ steps.secrets.outputs.has_play }}
      has_appstore: ${{ steps.secrets.outputs.has_appstore }}
    steps:
      - id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (tag v$VERSION)"

      - id: secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          has() { if [ -n "$1" ]; then echo true; else echo false; fi; }
          {
            echo "has_android_signing=$(has "$ANDROID_KEYSTORE_BASE64")"
            echo "has_play=$(has "$PLAY_SERVICE_ACCOUNT_JSON")"
            echo "has_appstore=$(has "$APP_STORE_CONNECT_API_KEY")"
          } >> "$GITHUB_OUTPUT"

  # ── Android: signed APK + AAB ────────────────────────────────────────────
  android:
    name: Build Android
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # Only present when the ANDROID_KEYSTORE_* secrets are set. Without them
      # the build falls back to debug signing (see android/app/build.gradle.kts)
      # — installable for testing but NOT accepted by Play (publish-play is
      # skipped in that case).
      - name: Configure release signing
        if: needs.preflight.outputs.has_android_signing == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build APK
        run: >
          flutter build apk --release
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Build App Bundle
        run: >
          flutter build appbundle --release
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/ArmaVPN-${{ needs.preflight.outputs.version }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
             "dist/ArmaVPN-${{ needs.preflight.outputs.version }}.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*
          if-no-files-found: error

  # ── Linux desktop bundle ─────────────────────────────────────────────────
  linux:
    name: Build Linux
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build tooling
        run: |
          sudo apt-get update
          # libsecret-1-dev is REQUIRED by flutter_secure_storage_linux's
          # CMake (pkg_check_modules(LIBSECRET REQUIRED ...)) and is NOT on the
          # default runner image — without it the CMake configure step fails.
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libglu1-mesa \
            libsecret-1-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-linux-desktop

      # rpm provides rpmbuild for the .rpm package.
      - name: Install packaging tooling
        run: sudo apt-get install -y rpm

      # Bundle the xray-core binary + geo data for proxy mode. ubuntu-latest is
      # amd64; for a linux-arm64 release, run this job on an arm64 runner and
      # swap the asset to Xray-linux-arm64-v8a.zip.
      - name: Fetch xray-core (linux-amd64)
        run: |
          mkdir -p assets/xray
          curl -fL -o /tmp/xray.zip \
            https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o /tmp/xray.zip -d assets/xray xray geoip.dat geosite.dat
          chmod +x assets/xray/xray

      - name: Build Linux
        run: >
          flutter build linux --release
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}

      # tar.gz (portable) + .deb (Debian/Ubuntu) + .rpm (Fedora/RHEL) +
      # AppImage (universal). See packaging/linux/*.sh.
      - name: Package (tar.gz, deb, rpm, AppImage)
        run: |
          V="${{ needs.preflight.outputs.version }}"
          mkdir -p dist
          tar -czf "dist/ArmaVPN-$V-linux-x64.tar.gz" \
            -C build/linux/x64/release/bundle .
          bash packaging/linux/build-deb.sh "$V" amd64
          bash packaging/linux/build-rpm.sh "$V" x86_64
          bash packaging/linux/build-appimage.sh "$V" x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
          if-no-files-found: error

  # ── Windows desktop: portable zip + Setup.exe, for x64 and arm64 ─────────
  windows:
    name: Build Windows (${{ matrix.arch }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    # arm64 uses GitHub's windows-11-arm runner; if it isn't available on your
    # plan, that leg is skipped instead of failing the whole release.
    continue-on-error: ${{ matrix.arch == 'arm64' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            xray_asset: Xray-windows-64.zip
            iss_arch: x64compatible
            build_dir: build\windows\x64\runner\Release
          - arch: arm64
            runner: windows-11-arm
            xray_asset: Xray-windows-arm64-v8a.zip
            iss_arch: arm64
            build_dir: build\windows\arm64\runner\Release
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop

      - name: Fetch xray-core (windows-${{ matrix.arch }})
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path assets/xray | Out-Null
          Invoke-WebRequest -Uri "https://github.com/XTLS/Xray-core/releases/latest/download/${{ matrix.xray_asset }}" -OutFile "$env:TEMP\xray.zip"
          Expand-Archive -Path "$env:TEMP\xray.zip" -DestinationPath assets/xray -Force

      - name: Build Windows
        run: >
          flutter build windows --release
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Package (zip + Setup.exe)
        shell: pwsh
        run: |
          $ver = "${{ needs.preflight.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "${{ matrix.build_dir }}\*" `
            -DestinationPath "dist/ArmaVPN-$ver-windows-${{ matrix.arch }}.zip"
          # Inno Setup → Setup.exe wizard (Start-menu shortcut, uninstaller).
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$ver" `
            "/DTargetArch=${{ matrix.iss_arch }}" `
            "/DArchTag=${{ matrix.arch }}" `
            "/DBuildDir=$PWD\${{ matrix.build_dir }}" `
            packaging\windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            dist/*.zip
            dist/*.exe
          if-no-files-found: error

  # ── iOS (unsigned archive for the GitHub release page) ───────────────────
  # NOTE: the iOS Xcode target + Xray xcframework wiring is still pending, so
  # this may fail until that work lands. continue-on-error keeps the rest of
  # the release publishing. App Store upload is a separate job below.
  ios:
    name: Build iOS (unsigned)
    needs: preflight
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build iOS (no codesign)
        run: >
          flutter build ios --release --no-codesign
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Package .app
        run: |
          mkdir -p dist
          ( cd build/ios/iphoneos && zip -r \
            "$GITHUB_WORKSPACE/dist/ArmaVPN-${{ needs.preflight.outputs.version }}-ios-unsigned.zip" Runner.app )

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/*
          if-no-files-found: warn

  # ── macOS desktop bundle ─────────────────────────────────────────────────
  macos:
    name: Build macOS
    needs: preflight
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-macos-desktop

      - name: Build macOS
        run: >
          flutter build macos --release
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Package
        run: |
          mkdir -p dist
          ( cd build/macos/Build/Products/Release && zip -r \
            "$GITHUB_WORKSPACE/dist/ArmaVPN-${{ needs.preflight.outputs.version }}-macos.zip" ./*.app )

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*
          if-no-files-found: warn

  # ── Publish everything to the GitHub Releases page ───────────────────────
  github-release:
    name: GitHub Release
    needs: [preflight, android, linux, windows, ios, macos]
    if: always() && needs.android.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List collected artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          name: ArmaVPN ${{ needs.preflight.outputs.version }}
          tag_name: ${{ needs.preflight.outputs.release_tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: artifacts/**/*

  # ── Publish AAB to Google Play (internal track) ──────────────────────────
  # Requires a signed AAB, so gated on BOTH the Play service account and the
  # Android signing keystore being configured.
  publish-play:
    name: Publish to Google Play
    needs: [preflight, android]
    if: >
      needs.android.result == 'success' &&
      needs.preflight.outputs.has_play == 'true' &&
      needs.preflight.outputs.has_android_signing == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android
          path: android-artifacts

      - name: Write Play service account key
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > play-service-account.json

      - name: Upload to Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play-service-account.json
          packageName: com.arma.vpn
          releaseFiles: android-artifacts/*.aab
          track: internal # promote to production manually, or change here
          status: completed

  # ── Publish IPA to App Store Connect (TestFlight) ────────────────────────
  # Self-contained signed build. NOTE: blocked on the pending iOS Xcode/Xray
  # wiring — continue-on-error so it never blocks the rest of the release.
  publish-appstore:
    name: Publish to App Store (TestFlight)
    needs: [preflight]
    if: needs.preflight.outputs.has_appstore == 'true'
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/build.mobileprovision"

      - name: Generate ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF

      - name: Build signed IPA
        run: >
          flutter build ipa --release
          --build-name=${{ needs.preflight.outputs.version }}
          --build-number=${{ github.run_number }}
          --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
